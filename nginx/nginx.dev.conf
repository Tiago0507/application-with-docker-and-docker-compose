worker_processes 1;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 512;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend_api {
        server backend-api:8000;
    }

    upstream backend_metrics {
        server backend-metrics:3001;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
        }

        location ~ ^/(health|docs|redoc|openapi.json) {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /metrics/ {
            proxy_pass         http://backend_metrics/metrics/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /events {
            proxy_pass         http://backend_metrics/events;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /health-metrics {
            proxy_pass         http://backend_metrics/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Vite HMR requires WebSocket proxying
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }
}
