server {
    listen 84;
    listen [::]:84;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for hashed assets (Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unknown routes return index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }
}
