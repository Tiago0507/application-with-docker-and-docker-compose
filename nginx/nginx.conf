worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Upstream services (resolved by Docker internal DNS) ────────────────────
    upstream backend_api {
        server backend-api:8000;
    }

    upstream backend_metrics {
        server backend-metrics:3001;
    }

    upstream frontend {
        server frontend:84;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        # ── FastAPI ────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── FastAPI docs ───────────────────────────────────────────────────────
        location ~ ^/(health|docs|redoc|openapi.json) {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── NestJS metrics service ─────────────────────────────────────────────
        location /metrics/ {
            proxy_pass         http://backend_metrics/metrics/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /events {
            proxy_pass         http://backend_metrics/events;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        location /health-metrics {
            proxy_pass         http://backend_metrics/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── React SPA (catch-all) ──────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
