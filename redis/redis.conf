# ── Network ────────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ── Memory ─────────────────────────────────────────────────────────────────────
maxmemory 128mb
# When the limit is reached, evict the least-recently-used keys that have a TTL
maxmemory-policy allkeys-lru

# ── Persistence: AOF (Append-Only File) ────────────────────────────────────────
# AOF gives finer durability granularity than RDB snapshots
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ── Persistence: RDB snapshot (fallback) ───────────────────────────────────────
# Save a snapshot if at least 1 key changed in the last 900 s / 10 in 300 s / etc.
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
dir /data

# ── Performance ────────────────────────────────────────────────────────────────
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 10
